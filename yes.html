<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>❤️</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Arial", sans-serif;
      }

      body {
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 50%, #6c5b7b 100%);
        overflow: hidden;
      }

      .container {
        display: flex;
        flex-direction: column;
        text-align: center;
        align-items: center;
        gap: 30px;
        max-width: 500px;
        margin: 20px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        animation: slideIn 0.8s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #gif-container {
        position: relative;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 300px;
      }

      .tenor-gif-embed {
        max-width: 300px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      h1 {
        font-size: 32px;
        color: #c06c84;
        animation: bounce 2s infinite;
        margin-bottom: 10px;
      }

      @keyframes bounce {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      h2 {
        font-size: 18px;
        color: #6c5b7b;
        margin-bottom: 20px;
        font-weight: 500;
      }

      .message {
        font-size: 16px;
        color: #888;
        line-height: 1.8;
        margin-bottom: 20px;
      }

      .hearts {
        font-size: 40px;
        animation: float 3s infinite;
      }

      @keyframes float {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      .btn-back {
        background: linear-gradient(135deg, #ff6b9d, #c06c84);
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }

      .btn-back:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 20px rgba(192, 108, 132, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="gif-container">
        <div
          class="tenor-gif-embed"
          data-postid="9804311574812597097"
          data-share-method="host"
          data-aspect-ratio="1.23333"
          data-width="100%"
        >
          <a href="https://tenor.com/view/cat-by-ednastochi-good-morning-oi-feliz-gif-9804311574812597097">Cat By Ednastochi Sticker</a>
        </div>
        <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
      </div>

      <h1>Cảm ơn em! 🎉</h1>
      <h2>Anh sẽ không làm em phải bực mình nữa đâu ạ 💕</h2>

      <div class="hearts">❤️ 💕 💖 💗 ❤️</div>

      <a href="index.html" class="btn-back">← Quay lại</a>
    </div>
  </body>
</html>
